# configs/agent_loop.yaml (template)
#
# Default: subscription-based Claude Code CLI (no API cost).
# Override per-project in workspaces/<id>/configs/agent_loop.yaml.
#
# --- Alternative planner configurations ---
#
# Option A: GPT-5.2 Pro via OpenAI API (per-token cost, requires OPENAI_API_KEY)
#   planner:
#     provider: openai
#     model: gpt-5.2-pro
#     reasoning_effort: high
#     background: true
#
# Option B: GPT-5.2 via Codex CLI (subscription, no API cost)
#   planner:
#     provider: codex_cli
#     model: gpt-5.2
#     reasoning_effort: medium   # passed as -c model_reasoning_effort="medium"
#     max_actions: 6
#
# Note: "pro" models (gpt-5.2-pro) are only available via OpenAI API (Option A).
#       Codex CLI (Option B) supports base models (gpt-5.2) at no per-token cost.
#       reasoning_effort for Codex CLI accepts: low, medium, high, xhigh.

planner:
  provider: claude_code_cli   # "openai" | "claude_code_cli" | "codex_cli"
  model: opus                 # claude_code_cli: "haiku" | "sonnet" | "opus"
  background: true
  max_actions: 6
  timeout: 1800               # planner call timeout in seconds

review:
  max_fix_tasks_per_review: 10
  questions:
    - Are the conclusions supported by the current results and evidence?
    - What are the top 1-3 highest-information next experiments, and why?
    - Any missing baselines/ablations or reproducibility/safety risks?
    - If we should pivot, propose 3 alternatives with minimal experiments.
